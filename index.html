<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Produção</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #2563eb;
            ring: 2px;
            ring-color: #bfdbfe;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Calculadora de Peso</h1>
            <p class="text-blue-100 text-sm mt-1">Controle de Produção e Embalagens</p>
        </div>

        <!-- Form -->
        <div class="p-6 space-y-4">
            <div class="input-group">
                <label class="block text-sm font-medium text-gray-700 mb-1">Quantidade Total da Produção</label>
                <input type="number" id="producao" placeholder="Ex: 1000" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Qtd. por Pacote</label>
                    <input type="number" id="pacote" placeholder="Ex: 10" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                </div>
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Qtd. por Fardo</label>
                    <input type="number" id="fardo" placeholder="Ex: 50" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Peso Embalagem (Pacote)</label>
                    <input type="number" step="0.001" id="peso1" placeholder="Kg" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                </div>
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Peso Embalagem (Fardo)</label>
                    <input type="number" step="0.001" id="peso2" placeholder="Kg" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                </div>
            </div>

            <button onclick="calcular()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all text-lg mt-4">
                CALCULAR PESO TOTAL
            </button>

            <button onclick="preencherTeste()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 rounded-lg transition-all text-sm mt-2">
                Preencher Dados de Teste
            </button>

            <!-- Result -->
            <div id="resultado-container" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-xl animate-fade-in">
                <p class="text-green-800 text-sm font-medium text-center uppercase tracking-wider">Resultado</p>
                <div id="resultado" class="text-3xl font-black text-green-700 text-center mt-1">
                    0.00kg
                </div>
                <div id="detalhes" class="mt-2 text-xs text-green-600 text-center space-y-1">
                    <!-- Detalhes calculados via JS -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-gray-50 p-4 border-t border-gray-100 text-center text-gray-400 text-xs">
            Calculadora de Produção v1.0
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>

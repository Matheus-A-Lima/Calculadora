<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Produção</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #2563eb;
            ring: 2px;
            ring-color: #bfdbfe;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gray-100 dark:bg-gray-900 transition-colors duration-300">
    <div class="bg-white dark:bg-gray-800 w-full max-w-md rounded-2xl shadow-xl overflow-hidden transition-colors duration-300">
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center relative">
            <button id="theme-toggle" class="absolute right-4 top-4 p-2 rounded-lg bg-blue-500 hover:bg-blue-400 transition-colors">
                <!-- Sun icon (visible in dark mode) -->
                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                <!-- Moon icon (visible in light mode) -->
                <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            </button>
            <h1 class="text-2xl font-bold">Calculadora de Peso</h1>
            <p class="text-blue-100 text-sm mt-1">Controle de Produção e Embalagens</p>
        </div>

        <!-- Form -->
        <div class="p-6 space-y-4">
            <div class="input-group">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Quantidade Total da Produção</label>
                <input type="number" step="any" id="producao" placeholder="Ex: 1000" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Qtd. por Pacote</label>
                    <input type="number" step="any" id="pacote" placeholder="Ex: 10" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                </div>
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Qtd. por Fardo</label>
                    <input type="number" step="any" id="fardo" placeholder="Ex: 50" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Peso Embalagem (Pacote)</label>
                    <input type="number" step="0.001" id="peso1" placeholder="Kg" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                </div>
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Peso Embalagem (Fardo)</label>
                    <input type="number" step="0.001" id="peso2" placeholder="Kg" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                </div>
            </div>

            <button onclick="calcular()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all text-lg mt-4">
                CALCULAR PESO TOTAL
            </button>

            <button onclick="preencherTeste()" class="w-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-medium py-2 rounded-lg transition-all text-sm mt-2">
                Preencher Dados de Teste
            </button>

            <!-- Result -->
            <div id="resultado-container" class="hidden mt-6 p-4 bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 rounded-xl animate-fade-in">
                <p class="text-green-800 dark:text-green-300 text-sm font-medium text-center uppercase tracking-wider">Resultado</p>
                <div id="resultado" class="text-3xl font-black text-green-700 dark:text-green-400 text-center mt-1">
                    0.00kg
                </div>
                <div id="detalhes" class="mt-2 text-xs text-green-600 dark:text-green-400 text-center space-y-1">
                    <!-- Detalhes calculados via JS -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-gray-50 dark:bg-gray-900/50 p-4 border-t border-gray-100 dark:border-gray-700 text-center text-gray-400 dark:text-gray-500 text-xs transition-colors">
            Calculadora de Produção v1.0
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
